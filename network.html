<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network — System Monitoring</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="topbar">
    <div id="topbar_left">
        <strong id="application_title">SYSMON</strong>
        <span class="topbar_tag">System Monitor</span>
    </div>
    <div id="topbar_right">
        <span id="host_name">N/A</span>
        <div id="ws_indicator" aria-live="polite">
            <span id="ws_dot"></span>
            <span id="ws_label">disconnected</span>
        </div>
    </div>
</header>
<div id="body">
<aside id="sidebar">
    <nav aria-label="Primary navigation">
        <div class="nav_section_label">Views</div>
        <ul class="nav_list">
            <li data-view="overview"><a class="nav_item" href="index.html"><span class="nav_icon">&#9635;</span>Overview</a></li>
            <li data-view="processes"><a class="nav_item" href="processes.html"><span class="nav_icon">&#8801;</span>Processes</a></li>
            <li data-view="memory"><a class="nav_item" href="memory.html"><span class="nav_icon">&#9647;</span>Memory</a></li>
            <li data-view="disk"><a class="nav_item" href="disk.html"><span class="nav_icon">&#9646;</span>Disk I/O</a></li>
            <li data-view="network"><a class="nav_item active" href="network.html"><span class="nav_icon">&#8645;</span>Network</a></li>
        </ul>
        <div class="nav_section_label">System</div>
        <ul class="nav_list">
            <li data-view="cores"><a class="nav_item" href="cores.html"><span class="nav_icon">&#9673;</span>CPU Cores</a></li>
        </ul>
    </nav>
    <footer id="sidebar_bottom">
        <p>WS: <span id="ws_status">not connected</span></p>
        <p>Uptime: <span id="uptime">N/A</span></p>
    </footer>
</aside>
<main id="main" role="main">
    <section id="metrics_grid" aria-label="Network metrics">
        <article class="metric_card" id="card_net">
            <div class="metric_top">
                <span class="metric_label">Network</span>
                <span class="metric_value" id="net_val">N/A</span>
            </div>
            <div class="metric_sub" id="net_sub">&uarr; N/A MB/s &middot; &darr; N/A MB/s</div>
            <div class="bar_bg">
                <div class="bar_fill" id="net_bar"></div>
            </div>
        </article>
    </section>
</main>
</div>
<script src="js/app.js"></script>
</body>
</html>
